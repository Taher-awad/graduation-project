version: "3.8"

services:

  service-auth:
    build:
      context: ./microservices
      dockerfile: service-auth/Dockerfile
    container_name: cortex_service_auth
    env_file:
      - .env
    depends_on:
      - db

  service-rooms:
    build:
      context: ./microservices
      dockerfile: service-rooms/Dockerfile
    container_name: cortex_service_rooms
    env_file:
      - .env
    depends_on:
      - db
      - service-auth

  service-assets:
    build:
      context: ./microservices
      dockerfile: service-assets/Dockerfile
    container_name: cortex_service_assets
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - minio
      - service-auth

  service-notifications:
    build:
      context: ./microservices
      dockerfile: service-notifications/Dockerfile
    container_name: cortex_service_notifications
    env_file:
      - .env
    depends_on:
      - redis

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: cortex_api_gateway
    ports:
      - "8000:8000"
    depends_on:
      - service-auth
      - service-rooms
      - service-assets
      - service-notifications

  service-3d-worker:
    build:
      context: ./microservices
      dockerfile: service-3d-worker/Dockerfile
    container_name: cortex_service_3d_worker
    command: celery -A celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - minio

  db:
    image: postgres:15
    container_name: cortex_db
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: cortex_redis
    # ports:
    #   - "6380:6379"

  minio:
    image: minio/minio
    container_name: cortex_minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - .env
    volumes:
      - minio_data:/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cortex_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      - api-gateway

volumes:
  postgres_data:
  minio_data:
